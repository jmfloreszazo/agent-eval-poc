# Pricing table — USD per 1M tokens, per model, per effective date.
#
# Looked up at runtime by scenario-3/src/pricing.py. The "date" field
# is the day the price became effective; pricing.py picks the most
# recent entry <= today.
#
# Sources (jun-2026, verify quarterly):
#   - https://azure.microsoft.com/pricing/details/cognitive-services/openai-service/
#   - https://openai.com/api/pricing/
#   - https://www.anthropic.com/pricing
#   - https://ai.google.dev/pricing
#   - https://github.com/marketplace/models (Copilot SaaS — opaque, no per-token billing)
#
# IMPORTANT: when invoicing or chargeback matters, reconcile against
# Azure Cost Management API. These are estimates.

models:

  # ---- GitHub Models naming (slash-prefixed) ----
  openai/gpt-4o-mini:
    family: openai
    encoder: o200k_base
    prices:
      - date: 2026-01-01
        input_per_million_usd: 0.150
        output_per_million_usd: 0.600

  openai/gpt-4o:
    family: openai
    encoder: o200k_base
    prices:
      - date: 2026-01-01
        input_per_million_usd: 2.50
        output_per_million_usd: 10.00

  openai/gpt-5:
    family: openai
    encoder: o200k_base
    prices:
      - date: 2026-01-01
        input_per_million_usd: 5.00
        output_per_million_usd: 15.00

  # ---- Bare names (kept for non-GitHub callers / unit tests) ----
  gpt-4o-mini:
    family: openai
    encoder: o200k_base
    prices:
      - date: 2026-01-01
        input_per_million_usd: 0.150
        output_per_million_usd: 0.600

  gpt-4o:
    family: openai
